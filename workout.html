<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyWorkout Buddy</title>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --accent: #ff9500; --text: #ffffff; --secondary: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .main-content { width: 60%; padding: 20px; overflow-y: auto; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 20px; padding-bottom: 120px; }
        .sidebar { width: 40%; background: #000; }
        .coach-img { width: 100%; height: 100%; object-fit: cover; }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 24px; margin: 0; color: var(--accent); }

        .controls-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-start { background: #30d158; color: black; }
        .btn-finish { background: #ff3b30; color: white; }
        .btn-config { background: #3a3a3c; color: white; flex: 0 0 50px; }

        .card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid #333; margin-bottom: 10px; }
        .input-row { display: grid; gap: 8px; align-items: center; margin-bottom: 8px; text-align: center; font-size: 12px; color: var(--secondary); }
        .weights-grid { grid-template-columns: 30px 1fr 1fr; }
        .distance-grid { grid-template-columns: 1fr 1fr; }
        .timed-grid { grid-template-columns: 30px 1fr; }

        input, select { background: #2c2c2e; border: 1px solid #3a3a3c; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; text-align: center; font-size: 16px; }
        .btn-add-set { background: transparent; color: var(--accent); border: 1px dashed var(--accent); width: 100%; margin-top: 10px; padding: 10px; border-radius: 10px; }

        .separator { height: 1px; background: #333; margin: 20px 0; }
        .calendar-section { background: var(--card); padding: 15px; border-radius: 16px; }
        .history-list { margin-top: 10px; font-size: 14px; color: var(--text); }
        .history-entry { border-bottom: 1px solid #333; padding: 12px 0; }
        .history-header { display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: #ff3b30; font-size: 18px; cursor: pointer; padding: 5px; }
        .history-exercise-row { padding-left: 10px; color: var(--secondary); font-size: 13px; margin-top: 4px; }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; }
        .page-btn { background: #3a3a3c; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header-row">
            <h1>Workout Buddy</h1>
            <button class="btn btn-config" onclick="toggleConfig()">⚙️</button>
        </div>

        <div class="controls-row">
            <button class="btn btn-start" onclick="startSession()">START</button>
            <button class="btn btn-finish" onclick="finishSession()">FINISH</button>
        </div>

        <div id="configPanel" style="display:none;" class="card">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">Add New Exercise</h4>
            <input type="text" id="newExName" placeholder="Exercise Name">
            <select id="newExType" style="margin: 10px 0;">
                <option value="weights">Weights (Sets/Lbs/Reps)</option>
                <option value="distance">Distance (Miles/Min)</option>
                <option value="timed">Timed (Sets/Seconds)</option>
            </select>
            <button class="btn btn-start" style="width:100%" onclick="saveToMaster()">Save to List</button>
        </div>

        <div id="activeWorkout"></div>

        <select id="picker" onchange="addExercise(this.value)">
            <option value="">+ Add Exercise...</option>
        </select>

        <div class="separator"></div>

        <div class="calendar-section">
            <h3 style="margin-top:0; color: var(--accent);">History</h3>
            <div id="historyList" class="history-list"></div>
            <div class="pagination">
                <button id="prevBtn" class="page-btn" onclick="changePage(-1)">← Newer</button>
                <span id="pageInfo" style="font-size: 12px;">Page 1</span>
                <button id="nextBtn" class="page-btn" onclick="changePage(1)">Older →</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <img src="profile.jpg" class="coach-img" alt="Coach">
    </div>

    <script>
        // Use a consistent key so your list doesn't disappear
        const MASTER_KEY = 'gym_buddy_master_list';
        const HISTORY_KEY = 'gym_buddy_history_data';
        let currentPage = 1;
        const recordsPerPage = 5;

        function toggleConfig() {
            const p = document.getElementById('configPanel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function saveToMaster() {
            const name = document.getElementById('newExName').value.trim();
            const type = document.getElementById('newExType').value;
            if(!name) { alert("Please enter a name"); return; }
            
            let list = JSON.parse(localStorage.getItem(MASTER_KEY) || '[]');
            list.push({name, type});
            localStorage.setItem(MASTER_KEY, JSON.stringify(list));
            
            document.getElementById('newExName').value = "";
            toggleConfig();
            refreshPicker();
            alert(name + " added to list!");
        }

        function refreshPicker() {
            const picker = document.getElementById('picker');
            const list = JSON.parse(localStorage.getItem(MASTER_KEY) || '[]');
            picker.innerHTML = '<option value="">+ Add Exercise...</option>';
            list.forEach(ex => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(ex);
                opt.textContent = ex.name;
                picker.appendChild(opt);
            });
        }

        function addExercise(json) {
            if(!json) return;
            const ex = JSON.parse(json);
            const container = document.getElementById('activeWorkout');
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong style="color:var(--accent)">${ex.name}</strong>
                    <span onclick="this.closest('.card').remove()" style="color:#ff3b30; cursor:pointer; font-weight:bold;">✕</span>
                </div>`;

            if(ex.type === 'weights') {
                html += `<div class="input-row weights-grid"><span>1</span><input type="number" placeholder="Lbs"><input type="number" placeholder="Reps"></div>
                         <button class="btn-add-set" onclick="addSet(this, 'weights')">+ Add Set</button>`;
            } else if(ex.type === 'distance') {
                html += `<div class="input-row distance-grid"><input type="number" step="0.1" placeholder="Miles"><input type="number" placeholder="Min"></div>`;
            } else if(ex.type === 'timed') {
                html += `<div class="input-row timed-grid"><span>1</span><input type="number" placeholder="Seconds"></div>
                         <button class="btn-add-set" onclick="addSet(this, 'timed')">+ Add Set</button>`;
            }
            card.innerHTML = html;
            container.appendChild(card);
            document.getElementById('picker').value = "";
        }

        function addSet(btn, type) {
            const card = btn.closest('.card');
            const setNum = card.querySelectorAll('.input-row').length + 1;
            const row = document.createElement('div');
            row.className = `input-row ${type === 'weights' ? 'weights-grid' : 'timed-grid'}`;
            row.innerHTML = type === 'weights' ? 
                `<span>${setNum}</span><input type="number" placeholder="Lbs"><input type="number" placeholder="Reps">` :
                `<span>${setNum}</span><input type="number" placeholder="Seconds">`;
            btn.before(row);
        }

        function startSession() { alert("Session started at " + new Date().toLocaleTimeString()); }

        function finishSession() {
            const cards = document.querySelectorAll('#activeWorkout .card');
            if(cards.length === 0) return alert("Nothing to save. Add an exercise!");

            let sessionData = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                exercises: Array.from(cards).map(c => {
                    const name = c.querySelector('strong').innerText;
                    const rows = c.querySelectorAll('.input-row');
                    let sets = Array.from(rows).map(r => {
                        const inputs = r.querySelectorAll('input');
                        return inputs.length === 2 ? `${inputs[0].value || 0}/${inputs[1].value || 0}` : `${inputs[0].value || 0}s`;
                    });
                    return { name, sets };
                })
            };

            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history.unshift(sessionData);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            location.reload();
        }

        function deleteEntry(id) {
            if(!confirm("Delete this session?")) return;
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history = history.filter(item => item.id !== id);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            loadHistory();
        }

        function changePage(dir) {
            currentPage += dir;
            loadHistory();
        }

        function loadHistory() {
            const hList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            
            if (history.length === 0) {
                hList.innerHTML = "<div style='color:gray; font-style:italic;'>No history yet.</div>";
                document.querySelector('.pagination').style.display = 'none';
                return;
            }

            document.querySelector('.pagination').style.display = 'flex';
            const totalPages = Math.ceil(history.length / recordsPerPage);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * recordsPerPage;
            const paginatedItems = history.slice(start, start + recordsPerPage);

            hList.innerHTML = paginatedItems.map(h => `
                <div class="history-entry">
                    <div class="history-header">
                        <strong style="color:var(--accent)">${h.date}</strong>
                        <span class="delete-btn" onclick="deleteEntry(${h.id})">🗑</span>
                    </div>
                    ${h.exercises.map(ex => `<div class="history-exercise-row">• ${ex.name}: ${ex.sets.join(', ')}</div>`).join('')}
                </div>
            `).join('');

            document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        refreshPicker();
        loadHistory();
    </script>
</body>
</html>
