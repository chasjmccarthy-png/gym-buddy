<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Buddy</title>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --accent: #ff9500; --text: #ffffff; --secondary: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .main-content { width: 60%; padding: 20px; overflow-y: auto; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 20px; }
        .sidebar { width: 40%; background: #000; }
        .coach-img { width: 100%; height: 100%; object-fit: cover; }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 24px; margin: 0; color: var(--accent); }

        /* Controls Row */
        .controls-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-start { background: #30d158; color: black; }
        .btn-finish { background: #ff3b30; color: white; }
        .btn-config { background: #3a3a3c; color: white; flex: 0 0 50px; }

        /* Exercise Cards */
        .card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid #333; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input, select { background: #2c2c2e; border: 1px solid #3a3a3c; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; }

        /* History & Calendar */
        .separator { height: 1px; background: #333; margin: 20px 0; }
        .calendar-section { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; }
        .history-list { margin-top: 10px; text-align: left; font-size: 13px; color: var(--secondary); }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header-row">
            <h1>Workout Buddy</h1>
            <button class="btn btn-config" onclick="toggleConfig()">⚙️</button>
        </div>

        <div class="controls-row">
            <button class="btn btn-start" onclick="startSession()">START SESSION</button>
            <button class="btn btn-finish" onclick="finishSession()">FINISH SESSION</button>
        </div>

        <div id="configPanel" style="display:none;" class="card">
            <input type="text" id="newExName" placeholder="Exercise Name" style="margin-bottom:10px;">
            <select id="newExType" style="margin-bottom:10px;">
                <option value="weights">Weights (Lbs/Reps)</option>
                <option value="distance">Distance (Miles/Min)</option>
            </select>
            <button class="btn btn-start" style="width:100%" onclick="saveToMaster()">Add to Master List</button>
        </div>

        <div id="activeWorkout"></div>

        <select id="picker" onchange="addExercise(this.value)">
            <option value="">+ Add Exercise...</option>
        </select>

        <div class="separator"></div>

        <div class="calendar-section">
            <h3 style="margin-top:0">Workout Calendar</h3>
            <div id="calendarDisplay" style="font-size: 14px; color: var(--accent);">
                Today: <span id="currentDateDisplay"></span>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div class="sidebar">
        <img src="profile.jpg" class="coach-img" alt="Coach">
    </div>

    <script>
        const MASTER_KEY = 'my_gym_list';
        const HISTORY_KEY = 'my_gym_history';
        
        document.getElementById('currentDateDisplay').innerText = new Date().toDateString();

        function toggleConfig() {
            const p = document.getElementById('configPanel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function saveToMaster() {
            const name = document.getElementById('newExName').value;
            const type = document.getElementById('newExType').value;
            if(!name) return;
            
            let list = JSON.parse(localStorage.getItem(MASTER_KEY) || '[]');
            list.push({name, type});
            localStorage.setItem(MASTER_KEY, JSON.stringify(list));
            
            document.getElementById('newExName').value = "";
            toggleConfig();
            refreshPicker();
        }

        function refreshPicker() {
            const picker = document.getElementById('picker');
            const list = JSON.parse(localStorage.getItem(MASTER_KEY) || '[]');
            picker.innerHTML = '<option value="">+ Add Exercise...</option>';
            list.forEach(ex => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(ex);
                opt.textContent = ex.name;
                picker.appendChild(opt);
            });
        }

        function addExercise(json) {
            if(!json) return;
            const ex = JSON.parse(json);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <strong>${ex.name}</strong>
                    <span onclick="this.closest('.card').remove()" style="color:#ff3b30; cursor:pointer">✕</span>
                </div>
                <div class="grid-2">
                    <input type="number" placeholder="${ex.type === 'weights' ? 'Lbs' : 'Miles'}">
                    <input type="number" placeholder="${ex.type === 'weights' ? 'Reps' : 'Min'}">
                </div>
            `;
            document.getElementById('activeWorkout').appendChild(card);
            document.getElementById('picker').value = "";
        }

        function startSession() {
            const startTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            alert("Session started at " + startTime);
        }

        function finishSession() {
            const cards = document.querySelectorAll('.card:not(#configPanel)');
            if(cards.length === 0) return alert("Nothing to save!");

            let summary = Array.from(cards).map(c => {
                const name = c.querySelector('strong').innerText;
                const vals = c.querySelectorAll('input');
                return `${name}: ${vals[0].value}/${vals[1].value}`;
            });

            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history.unshift({ date: new Date().toLocaleDateString(), data: summary.join(', ') });
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            
            location.reload();
        }

        function loadHistory() {
            const hList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            hList.innerHTML = history.map(h => `<div><strong>${h.date}:</strong> ${h.data}</div>`).join('');
        }

        refreshPicker();
        loadHistory();
    </script>
</body>
</html>
